name: CI

on:
  push:
    branches: [main]
  # Run on every pull request, regardless of base branch, so stacked PRs are
  # covered too.
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One job for the whole required pipeline: install once, build once, and
  # reuse that build for the e2e run (Playwright serves it via `npm run start`).
  verify:
    name: Lint, type-check, build & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Integration tests (mocked upstream)
        run: npm test

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (reuses the build above)
        run: npm run test:e2e

      # Always upload (unless cancelled) so the report — which embeds the
      # generated profile picture as an attachment — can be inspected on
      # green runs too, not just failures.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Kept separate and non-blocking: it depends on a third-party service
  # (api.fxtwitter.com), so its flakiness must never gate the required job.
  # Runs in parallel, so it adds no wall-clock time to the gate.
  live-smoke:
    name: Live upstream smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch the real tech4palestine profile picture
        run: npm run test:live
