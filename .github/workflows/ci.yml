name: CI

on:
  push:
    branches: [main]
  # Run on every pull request, regardless of base branch, so stacked PRs are
  # covered too.
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes don't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One job for the whole required pipeline: install once, build once, and
  # reuse that build for the e2e run (Playwright serves it via `npm run start`).
  verify:
    name: Lint, type-check, build & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Integration tests (mocked upstream)
        run: npm test

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (reuses the build above)
        run: npm run test:e2e

      # The generated profile picture as a standalone PNG — open it directly,
      # no report server needed. Uploaded on every non-cancelled run.
      - name: Upload generated profile picture
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: generated-profile-pic
          path: playwright-artifacts/
          retention-days: 7

      # Full Playwright report for debugging failures. Note: view it with
      # `npx playwright show-report` — opening index.html from file:// leaves
      # attachment images broken (the report fetches them over HTTP).
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Kept separate and non-blocking: it depends on a third-party service
  # (api.fxtwitter.com), so its flakiness must never gate the required job.
  # Runs in parallel, so it adds no wall-clock time to the gate.
  live-smoke:
    name: Live upstream smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch the real tech4palestine profile picture
        run: npm run test:live

  # Full-stack e2e against the REAL tech4palestine pic (drives the UI, calls
  # the real upstreams). Non-blocking for the same reason as live-smoke.
  e2e-live:
    name: Live e2e (real pic, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run live e2e (real tech4palestine pic)
        run: npm run test:e2e:live

      - name: Upload generated profile picture (real)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: generated-profile-pic-live
          path: playwright-artifacts/
          retention-days: 7
